version: '3.8'

services:
  alatoo-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-alatoosign}
      POSTGRES_USER: ${DB_USER:-alatoo}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  alatoo-cache:
    image: redis:7
    restart: always

  alatoo-s3:
    image: minio/minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  alatoo-gotenberg:
    image: gotenberg/gotenberg:8
    restart: always

  alatoo-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DB_HOST: alatoo-db
      REDIS_HOST: alatoo-cache
      S3_HOST: alatoo-s3
      GOTENBERG_URL: http://alatoo-gotenberg:3000
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      alatoo-db:
        condition: service_healthy
      alatoo-cache:
        condition: service_started
      alatoo-s3:
        condition: service_started
      alatoo-gotenberg:
        condition: service_started

  alatoo-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN_NAME}/api/v1
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN_NAME}/api/v1
    depends_on:
      - alatoo-backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_www:/var/www/certbot
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
    command: /bin/sh -c "envsubst '$$DOMAIN_NAME' < /etc/nginx/nginx.conf > /etc/nginx/nginx.conf.tmp && mv /etc/nginx/nginx.conf.tmp /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    depends_on:
      - alatoo-frontend
      - alatoo-backend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  minio_data:
  certbot_etc:
  certbot_var:
  certbot_www:
