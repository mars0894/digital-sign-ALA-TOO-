server:
  port: 8081
  forward-headers-strategy: native

spring:
  application:
    name: digital-sign
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-secret}
            scope: profile, email
    servlet:
      multipart:
        max-file-size: 20MB
        max-request-size: 25MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/alatoosign
    username: ${DB_USERNAME:alatoo}
    password: ${DB_PASSWORD:alatoo123}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:dev-user}
    password: ${MAIL_PASSWORD:dev-pass}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  flyway:
    enabled: true
    baseline-on-migrate: true

aws:
  s3:
    endpoint: http://${S3_HOST:localhost}:9000
    region: us-east-1
    access-key: ${S3_ACCESS_KEY:admin}
    secret-key: ${S3_SECRET_KEY:admin123}
    bucket: digital-signatures

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 24 hours

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    org.springframework.security: DEBUG
    kg.edu.alatoo.sign: DEBUG

gotenberg:
  url: ${GOTENBERG_URL:http://localhost:8082}