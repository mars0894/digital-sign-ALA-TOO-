server:
  port: 8081

spring:
  application:
    name: digital-sign
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:mock-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:mock-google-client-secret}
            scope: profile, email
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/alatoosign
    username: ${DB_USERNAME:alatoo}
    password: ${DB_PASSWORD:alatoo123}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  flyway:
    enabled: true
    baseline-on-migrate: true

aws:
  s3:
    endpoint: http://${S3_HOST:localhost}:9000
    region: us-east-1
    access-key: ${S3_ACCESS_KEY:admin}
    secret-key: ${S3_SECRET_KEY:admin123}
    bucket: digital-signatures

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000 # 24 hours

logging:
  level:
    org.springframework.security: DEBUG
    kg.edu.alatoo.sign: DEBUG

gotenberg:
  url: ${GOTENBERG_URL:http://localhost:8082}