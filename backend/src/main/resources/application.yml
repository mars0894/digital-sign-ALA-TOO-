spring:
  application:
    name: digital-sign
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:digital_sign}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

cloud:
  aws:
    credentials:
      access-key: ${S3_ACCESS_KEY:admin}
      secret-key: ${S3_SECRET_KEY:password123}
    s3:
      endpoint: ${S3_ENDPOINT:http://localhost:9000}
      region.static: ${S3_REGION:us-east-1}
      bucket-name: ${S3_BUCKET_NAME:alatoo-documents}

server:
  port: 8080

logging:
  level:
    kg.edu.alatoo: DEBUG
    org.springframework.security: INFO
