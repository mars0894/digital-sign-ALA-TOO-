version: '3.8'

services:
  alatoo-db:
    image: postgres:15
    container_name: alatoo-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  alatoo-cache:
    image: redis:7
    container_name: alatoo-cache
    ports:
      - "6379:6379"

  alatoo-s3:
    image: minio/minio
    container_name: alatoo-s3
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"

  alatoo-gotenberg:
    image: gotenberg/gotenberg:8
    container_name: alatoo-gotenberg
    ports:
      - "8082:3000"

  alatoo-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alatoo-backend
    ports:
      - "8081:8081"
    environment:
      DB_HOST: alatoo-db
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: alatoo-cache
      S3_HOST: alatoo-s3
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      GOTENBERG_URL: http://alatoo-gotenberg:3000
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      alatoo-db:
        condition: service_healthy
      alatoo-cache:
        condition: service_started
      alatoo-s3:
        condition: service_started
      alatoo-gotenberg:
        condition: service_started

volumes:
  postgres_data:

