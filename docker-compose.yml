version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: alatoo-db
    environment:
      POSTGRES_DB: digital_sign
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: alatoo-cache
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: alatoo-s3
    environment:
      MINIO_ROOT_USER: ${S3_USER:-admin}
      MINIO_ROOT_PASSWORD: ${S3_PASSWORD:-password123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
